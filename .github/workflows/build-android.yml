name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build-type: [apk, aab]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: yarn install
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Generate native android project
        working-directory: frontend
        run: npx expo prebuild --platform android --clean
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Generate Release Keystore
        working-directory: frontend/android/app
        run: |
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore release-keystore.jks \
            -alias cricapp-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass CricApp2026Release \
            -keypass CricApp2026Release \
            -dname "CN=CricApp, OU=Mobile, O=GemmiApps, L=Jammu, ST=JK, C=IN"
          echo "Release keystore generated successfully"

      - name: Configure Release Signing in build.gradle
        working-directory: frontend/android/app
        run: |
          # Create a Python script to properly modify build.gradle
          cat > fix_signing.py << 'PYTHON_SCRIPT'
          import re

          with open('build.gradle', 'r') as f:
              content = f.read()

          # New signing configs block with both debug and release
          new_signing_configs = '''    signingConfigs {
              debug {
                  storeFile file('debug.keystore')
                  storePassword 'android'
                  keyAlias 'androiddebugkey'
                  keyPassword 'android'
              }
              release {
                  storeFile file('release-keystore.jks')
                  storePassword 'CricApp2026Release'
                  keyAlias 'cricapp-release'
                  keyPassword 'CricApp2026Release'
              }
          }'''

          # Replace existing signingConfigs block
          pattern = r'signingConfigs\s*\{[^}]*debug\s*\{[^}]*\}[^}]*\}'
          content = re.sub(pattern, new_signing_configs, content)

          # Update release buildType to use signingConfigs.release
          content = re.sub(
              r'(release\s*\{[^}]*signingConfig\s+)signingConfigs\.debug',
              r'\1signingConfigs.release',
              content
          )

          with open('build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle updated successfully")
          PYTHON_SCRIPT
          
          python3 fix_signing.py
          
          # Verify the changes
          echo "=== Checking signingConfigs in build.gradle ==="
          grep -A 20 "signingConfigs {" build.gradle | head -25
          echo "=== Checking release buildType ==="
          grep -A 5 "release {" build.gradle | head -10

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            frontend/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK (Release)
        if: matrix.build-type == 'apk'
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Build AAB (Release)
        if: matrix.build-type == 'aab'
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Upload APK
        if: matrix.build-type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-APK
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB
        if: matrix.build-type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-AAB
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Keystore (IMPORTANT - Save this!)
        if: matrix.build-type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-Keystore-SAVE-THIS
          path: frontend/android/app/release-keystore.jks
          retention-days: 365

      - name: Build Summary
        run: |
          echo "## ✅ Build Complete: ${{ matrix.build-type }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Build Info" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: Android" >> $GITHUB_STEP_SUMMARY
          echo "- Type: ${{ matrix.build-type == 'apk' && 'APK (Direct Install)' || 'AAB (Play Store)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Signing: **RELEASE** (Play Store Ready)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔐 KEYSTORE INFO (SAVE THIS!)" >> $GITHUB_STEP_SUMMARY
          echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| File | release-keystore.jks |" >> $GITHUB_STEP_SUMMARY
          echo "| Password | CricApp2026Release |" >> $GITHUB_STEP_SUMMARY
          echo "| Alias | cricapp-release |" >> $GITHUB_STEP_SUMMARY
          echo "| Key Password | CricApp2026Release |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ **Download the keystore from Artifacts! You need it for ALL future updates.**" >> $GITHUB_STEP_SUMMARY
