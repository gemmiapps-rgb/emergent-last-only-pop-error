name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build-type: [apk, aab]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: yarn install
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Generate native android project
        working-directory: frontend
        run: npx expo prebuild --platform android --clean
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Generate Release Keystore
        working-directory: frontend/android/app
        run: |
          # Generate release keystore if it doesn't exist
          keytool -genkeypair -v \
            -storetype PKCS12 \
            -keystore release-keystore.jks \
            -alias cricapp-release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass CricApp2026Release \
            -keypass CricApp2026Release \
            -dname "CN=CricApp, OU=Mobile, O=GemmiApps, L=Jammu, ST=JK, C=IN"
          echo "Release keystore generated successfully"

      - name: Configure Release Signing
        working-directory: frontend/android/app
        run: |
          # Update build.gradle to use release keystore
          sed -i 's/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/' build.gradle
          
          # Add release signing config if not present
          if ! grep -q "signingConfigs.release" build.gradle; then
            sed -i '/signingConfigs {/,/debug {/c\
            signingConfigs {\
                debug {\
                    storeFile file('\''debug.keystore'\'')\
                    storePassword '\''android'\''\
                    keyAlias '\''androiddebugkey'\''\
                    keyPassword '\''android'\''\
                }\
                release {\
                    storeFile file('\''release-keystore.jks'\'')\
                    storePassword '\''CricApp2026Release'\''\
                    keyAlias '\''cricapp-release'\''\
                    keyPassword '\''CricApp2026Release'\''\
                }' build.gradle
          fi
          
          echo "Release signing configured"

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            frontend/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK (Release)
        if: matrix.build-type == 'apk'
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Build AAB (Release)
        if: matrix.build-type == 'aab'
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Upload APK
        if: matrix.build-type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-APK
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB
        if: matrix.build-type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-AAB
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload Keystore (Save for future updates)
        if: matrix.build-type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-Keystore
          path: frontend/android/app/release-keystore.jks
          retention-days: 365

      - name: Build Summary
        run: |
          echo "## Build Complete: ${{ matrix.build-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: Android" >> $GITHUB_STEP_SUMMARY
          echo "- Type: ${{ matrix.build-type == 'apk' && 'APK (Direct Install)' || 'AAB (Play Store)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Signing: RELEASE (Play Store Ready)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ matrix.build-type }}" == "apk" ]; then
            echo "- Size: $(du -sh frontend/android/app/build/outputs/apk/release/*.apk 2>/dev/null | cut -f1 || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Size: $(du -sh frontend/android/app/build/outputs/bundle/release/*.aab 2>/dev/null | cut -f1 || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Keystore Info (SAVE THIS!)" >> $GITHUB_STEP_SUMMARY
          echo "- Keystore File: release-keystore.jks" >> $GITHUB_STEP_SUMMARY
          echo "- Keystore Password: CricApp2026Release" >> $GITHUB_STEP_SUMMARY
          echo "- Key Alias: cricapp-release" >> $GITHUB_STEP_SUMMARY
          echo "- Key Password: CricApp2026Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ IMPORTANT: Download and save the keystore file! You need it for all future updates." >> $GITHUB_STEP_SUMMARY
