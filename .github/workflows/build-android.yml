name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build-type: [apk, aab]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Generate native android project
        working-directory: frontend
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            frontend/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK (Release)
        if: matrix.build-type == 'apk'
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Build AAB (Release)
        if: matrix.build-type == 'aab'
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g"

      - name: Upload APK
        if: matrix.build-type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-APK
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB
        if: matrix.build-type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-AAB
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## Build Complete: ${{ matrix.build-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Platform: Android" >> $GITHUB_STEP_SUMMARY
          echo "- Type: ${{ matrix.build-type == 'apk' && 'APK (Direct Install)' || 'AAB (Play Store)' }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ matrix.build-type }}" == "apk" ]; then
            echo "- Size: $(du -sh frontend/android/app/build/outputs/apk/release/*.apk 2>/dev/null | cut -f1 || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Size: $(du -sh frontend/android/app/build/outputs/bundle/release/*.aab 2>/dev/null | cut -f1 || echo 'N/A')" >> $GITHUB_STEP_SUMMARY
          fi
