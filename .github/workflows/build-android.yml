name: Build Android APK & AAB

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build-type: [apk, aab]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: yarn install
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Generate native android project
        working-directory: frontend
        run: npx expo prebuild --platform android --clean
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Restore Release Keystore from Base64
        working-directory: frontend/android/app
        run: |
          # Decode the base64 keystore (same keystore used in GemmiApps builds)
          echo "" | base64 -d > release-keystore.jks
          echo "Release keystore restored from base64"
          ls -la release-keystore.jks

      - name: Configure Release Signing in build.gradle
        working-directory: frontend/android/app
        run: |
          cat > fix_signing.py << 'PYTHON_SCRIPT'
          import re

          with open('build.gradle', 'r') as f:
              content = f.read()

          new_signing_configs = '''    signingConfigs {
              debug {
                  storeFile file('debug.keystore')
                  storePassword 'android'
                  keyAlias 'androiddebugkey'
                  keyPassword 'android'
              }
              release {
                  storeFile file('release-keystore.jks')
                  storePassword 'CricApp2026Release'
                  keyAlias 'cricapp-release'
                  keyPassword 'CricApp2026Release'
              }
          }'''

          pattern = r'signingConfigs\s*\{[^}]*debug\s*\{[^}]*\}[^}]*\}'
          content = re.sub(pattern, new_signing_configs, content)

          content = re.sub(
              r'(release\s*\{[^}]*signingConfig\s+)signingConfigs\.debug',
              r'\1signingConfigs.release',
              content
          )

          with open('build.gradle', 'w') as f:
              f.write(content)

          print("build.gradle updated successfully")
          PYTHON_SCRIPT
          
          python3 fix_signing.py

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            frontend/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build APK (Release)
        if: matrix.build-type == 'apk'
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Build AAB (Release)
        if: matrix.build-type == 'aab'
        working-directory: frontend/android
        run: ./gradlew bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4g -XX:+HeapDumpOnOutOfMemoryError"

      - name: Upload APK
        if: matrix.build-type == 'apk'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-APK
          path: frontend/android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload AAB
        if: matrix.build-type == 'aab'
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-AAB
          path: frontend/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Build Summary
        run: |
          echo "## ✅ Build Complete: ${{ matrix.build-type }}" >> $GITHUB_STEP_SUMMARY
          echo "- Signing: RELEASE (Same keystore as GemmiApps builds)" >> $GITHUB_STEP_SUMMARY
          echo "- Version: 1.0.2 | Code: 2" >> $GITHUB_STEP_SUMMARY
