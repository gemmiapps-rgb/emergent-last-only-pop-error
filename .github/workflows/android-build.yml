name: Android Build (APK & AAB)

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type to generate'
        required: true
        default: 'both'
        type: choice
        options:
          - apk
          - aab
          - both

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: ./frontend
        run: |
          npm install --legacy-peer-deps
          npm install ajv --save-dev
          
      - name: CRITICAL - Hard Clean Native Folder
        working-directory: ./frontend
        run: |
          rm -rf android
          npx expo prebuild --platform android --clean

      - name: Build APK (Release)
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' }}
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Build AAB (Release)
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' }}
        working-directory: ./frontend/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon -Dorg.gradle.jvmargs="-Xmx4096m -XX:MaxMetaspaceSize=512m"

      - name: Upload APK artifact
        if: ${{ github.event.inputs.build_type == 'apk' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-APK
          path: frontend/android/app/build/outputs/apk/release/app-release.apk

      - name: Upload AAB artifact
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == 'both' }}
        uses: actions/upload-artifact@v4
        with:
          name: CricApp-Release-AAB
          path: frontend/android/app/build/outputs/bundle/release/app-release.aab
